name: Automated Testing Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  smart-contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Compile contracts
      run: npx hardhat compile
      
    - name: Run contract tests
      run: npx hardhat test
      
    - name: Run contract coverage
      run: npx hardhat coverage
      
    - name: Gas report
      run: npx hardhat test --reporter gas-reporter
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: smart-contracts
        name: smart-contract-coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Run Prettier check
      run: npm run format -- --check
      
    - name: Run TypeScript type check
      run: npm run type-check
      
    - name: Run unit tests
      run: npm test -- --coverage --watchAll=false
      
    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [smart-contract-tests, frontend-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Compile contracts
      run: npx hardhat compile
      
    - name: Run integration tests
      run: npx hardhat test test/integration/**/*.test.js
      
    - name: Run end-to-end tests
      run: npm run test:e2e || true # Skip if not configured yet

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      
    - name: Run Slither analysis
      uses: crytic/slither-action@v0.3.0
      id: slither
      with:
        target: 'contracts/'
        slither-args: '--filter-paths "node_modules/" --exclude naming-convention,external-function'
        
    - name: Upload Slither results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: ${{ steps.slither.outputs.sarif }}

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [smart-contract-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Compile contracts
      run: npx hardhat compile
      
    - name: Run gas usage benchmarks
      run: npx hardhat test test/performance/**/*.test.js --reporter gas-reporter
      
    - name: Run load tests
      run: npm run test:load || true # Skip if not configured yet

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Test build output
      run: ls -la build/ || ls -la dist/ || true

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [smart-contract-tests, frontend-tests, integration-tests, build-test]
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Deploy to preview
      run: echo "Preview deployment would go here"
      # Add actual deployment step when ready

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [smart-contract-tests, frontend-tests, integration-tests, security-audit, performance-tests]
    if: always()
    
    steps:
    - name: Notify on success
      if: ${{ needs.smart-contract-tests.result == 'success' && needs.frontend-tests.result == 'success' && needs.integration-tests.result == 'success' }}
      run: |
        echo "✅ All tests passed successfully!"
        echo "🚀 Ready for merge and deployment"
        
    - name: Notify on failure
      if: ${{ needs.smart-contract-tests.result == 'failure' || needs.frontend-tests.result == 'failure' || needs.integration-tests.result == 'failure' }}
      run: |
        echo "❌ Some tests failed"
        echo "🔧 Please review and fix the issues before merging"
