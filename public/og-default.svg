<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)" />
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.1)" />
  <circle cx="900" cy="150" r="60" fill="rgba(255,255,255,0.05)" />
  
  <!-- Logo Circle -->
  <circle cx="600" cy="250" r="100" fill="white" opacity="0.2" />
  <circle cx="600" cy="250" r="80" fill="white" opacity="0.3" />
  
  <!-- W Letter -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle">W</text>
  
  <!-- Title -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">Wuta-Wuta</text>
  
  <!-- Subtitle -->
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">AI-Human Art Marketplace</text>
  
  <!-- Tagline -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle">Where artificial creativity meets human imagination</text>
  
  <!-- URL -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">muse-art-marketplace.com</text>
</svg>
